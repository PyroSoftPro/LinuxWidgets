<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Linux Widgets</title>
  <link rel="stylesheet" href="manager.css">
</head>
<body>
  <!-- Custom title bar -->
  <div id="titlebar">
    <div class="titlebar-drag">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="1" width="9" height="9" rx="2"/><rect x="14" y="1" width="9" height="9" rx="2"/><rect x="1" y="14" width="9" height="9" rx="2"/><rect x="14" y="14" width="9" height="9" rx="2"/></svg>
      <span>Linux Widgets</span>
    </div>
    <div class="titlebar-controls">
      <button id="btn-min" title="Minimize">
        <svg width="12" height="12" viewBox="0 0 12 12"><line x1="2" y1="6" x2="10" y2="6" stroke="currentColor" stroke-width="1.5"/></svg>
      </button>
      <button id="btn-close" title="Close" class="close">
        <svg width="12" height="12" viewBox="0 0 12 12"><line x1="2" y1="2" x2="10" y2="10" stroke="currentColor" stroke-width="1.5"/><line x1="10" y1="2" x2="2" y2="10" stroke="currentColor" stroke-width="1.5"/></svg>
      </button>
    </div>
  </div>

  <div id="content">
    <h2 class="section-title">Add Widget</h2>
    <div id="widget-grid">
      <div class="widget-card" data-type="weather">
        <div class="card-icon weather-icon">
          <svg viewBox="0 0 48 48"><circle cx="20" cy="18" r="8" fill="#fbbf24"/><path d="M20 6v3M20 27v3M30 18h3M7 18h3M27.1 10.9l2.1-2.1M10.8 27.2l2.1-2.1M27.1 25.1l2.1 2.1M10.8 8.8l2.1 2.1" stroke="#fbbf24" stroke-width="2" stroke-linecap="round"/><path d="M28 30a8 8 0 0 1 8 8H12a8 8 0 0 1 8-8h8z" fill="rgba(255,255,255,0.3)"/></svg>
        </div>
        <h3>Weather</h3>
        <p>Current conditions & 5-day forecast</p>
      </div>
      <div class="widget-card" data-type="system">
        <div class="card-icon system-icon">
          <svg viewBox="0 0 48 48"><rect x="6" y="8" width="36" height="24" rx="3" fill="none" stroke="#a78bfa" stroke-width="2.5"/><line x1="16" y1="36" x2="32" y2="36" stroke="#a78bfa" stroke-width="2.5" stroke-linecap="round"/><circle cx="24" cy="20" r="8" fill="none" stroke="#a78bfa" stroke-width="2" stroke-dasharray="40 12"/></svg>
        </div>
        <h3>System</h3>
        <p>CPU, RAM, disk & temperature</p>
      </div>
      <div class="widget-card" data-type="network">
        <div class="card-icon network-icon">
          <svg viewBox="0 0 48 48"><path d="M12 36V24l8-8 8 8v12" fill="none" stroke="#34d399" stroke-width="2.5"/><polyline points="8 28 24 12 40 28" fill="none" stroke="#34d399" stroke-width="2.5"/><line x1="36" y1="20" x2="36" y2="36" stroke="#34d399" stroke-width="2" stroke-dasharray="3 3"/><polygon points="33 18 36 12 39 18" fill="#34d399"/></svg>
        </div>
        <h3>Network</h3>
        <p>Speed, IP & interface stats</p>
      </div>
      <div class="widget-card" data-type="sticky">
        <div class="card-icon sticky-icon">
          <svg viewBox="0 0 48 48"><rect x="8" y="8" width="32" height="32" rx="3" fill="#fbbf24" opacity="0.3"/><rect x="8" y="8" width="32" height="32" rx="3" fill="none" stroke="#fbbf24" stroke-width="2.5"/><line x1="14" y1="18" x2="34" y2="18" stroke="#fbbf24" stroke-width="1.5" opacity="0.6"/><line x1="14" y1="24" x2="30" y2="24" stroke="#fbbf24" stroke-width="1.5" opacity="0.6"/><line x1="14" y1="30" x2="26" y2="30" stroke="#fbbf24" stroke-width="1.5" opacity="0.6"/></svg>
        </div>
        <h3>Sticky Note</h3>
        <p>Quick notes on your desktop</p>
      </div>
      <div class="widget-card" data-type="calendar">
        <div class="card-icon calendar-icon">
          <svg viewBox="0 0 48 48"><rect x="8" y="12" width="32" height="28" rx="3" fill="none" stroke="#f472b6" stroke-width="2.5"/><line x1="8" y1="20" x2="40" y2="20" stroke="#f472b6" stroke-width="2"/><line x1="16" y1="8" x2="16" y2="16" stroke="#f472b6" stroke-width="2.5" stroke-linecap="round"/><line x1="32" y1="8" x2="32" y2="16" stroke="#f472b6" stroke-width="2.5" stroke-linecap="round"/><circle cx="24" cy="30" r="3" fill="#f472b6"/></svg>
        </div>
        <h3>Calendar</h3>
        <p>Month view with event markers</p>
      </div>
      <div class="widget-card" data-type="clock">
        <div class="card-icon clock-icon">
          <svg viewBox="0 0 48 48"><circle cx="24" cy="24" r="16" fill="none" stroke="#fb923c" stroke-width="2.5"/><line x1="24" y1="24" x2="24" y2="14" stroke="#fb923c" stroke-width="2.5" stroke-linecap="round"/><line x1="24" y1="24" x2="32" y2="24" stroke="#fb923c" stroke-width="2" stroke-linecap="round"/><circle cx="24" cy="24" r="2" fill="#fb923c"/></svg>
        </div>
        <h3>Clock</h3>
        <p>Digital or analog time display</p>
      </div>
    </div>

    <h2 class="section-title">Active Widgets <span id="active-count">0</span></h2>
    <div id="active-list"></div>
  </div>

  <script src="manager.js"></script>
</body>
</html>
